<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Електронна Черга</title>
    <!-- Підключаємо Pico.css для гарного вигляду -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong><a href="/" class="contrast">🚀 QueueSystem</a></strong></li>
        </ul>
        <ul>
            <li><a href="/">Головна</a></li>
            {% if user_id %}
                <li><a href="/queues/create" class="secondary">Створити чергу</a></li>
                <li><a href="/logout" class="outline">Вихід</a></li>
            {% else %}
                <li><a href="/login">Вхід</a></li>
                <li><a href="/register" class="outline">Реєстрація</a></li>
            {% endif %}
        </ul>
    </nav>

    <main class="container">
        {% block content %}
        <!-- Сюди буде підставлятися код з інших файлів -->
        {% endblock %}
    </main>

    <footer class="container">
        <small>© 2026 Система електронних черг. Навчальний проект.</small>
    </footer>
</body>
</html>
